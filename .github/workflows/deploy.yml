name: GradeScale_CI_CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test

  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run Frontend Tests
        run: cd frontend && npm run test

      - name: Build check (Frontend)
        run: cd frontend && npm run build

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [test-backend, check-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set lowercase repository owner
        run: echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/grade-scale:latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Rollout Azure Container App
        id: rollout
        run: |
          echo "🚀 Mise à jour de la Container App..."
          # On retire --no-wait pour s'assurer que la commande attend la création de la révision
          az containerapp update \
            --name aca-gradescale-api-dev \
            --resource-group rg-gradescale-dev \
            --image ghcr.io/${{ env.REPO_OWNER }}/grade-scale:latest \
            --revision-suffix rev${{ github.run_number }}
          
          echo "🔍 Récupération de l'URL de la nouvelle révision..."
          # On récupère le FQDN de la toute dernière révision
          URL=$(az containerapp show \
            --name aca-gradescale-api-dev \
            --resource-group rg-gradescale-dev \
            --query "properties.latestRevisionFqdn" -o tsv)
          
          if [ -z "$URL" ]; then
            echo "❌ Erreur : Impossible de récupérer le FQDN de la révision"
            exit 1
          fi
          
          echo "NEW_REVISION_URL=https://$URL" >> $GITHUB_ENV

      - name: Targeted Smoke Test
        run: |
          echo "🩺 Smoke Test sur : ${{ env.NEW_REVISION_URL }}/health"
          
          # On attend que la révision soit provisionnée et réponde
          timeout 300s bash -c '
            until curl -sSf "${{ env.NEW_REVISION_URL }}/health"; do
              echo "⏳ Révision en cours de démarrage... (Retry dans 5s)"
              sleep 5
            done
          '
          
          echo "✅ La nouvelle révision est UP et répond sur son URL dédiée !"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [test-backend, check-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Deploy Frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
          app_build_command: "npm ci && npm run build"
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
